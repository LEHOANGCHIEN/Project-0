    <style>
        .parent {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .child {
            background-color: orange;
            border: 2px solid black;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            padding: 10px;
        }

        .child-4 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .box {
            background-color: red;
            border: 2px solid white;
            padding: 10px;
        }

        .box-1 {
            grid-column: span 2;
        }
    </style>
    <div class="parent">
        <div class="child child-1">1</div>
        <div class="child">2</div>
        <div class="child">3</div>
        <div class="child child-4">
            <div class="box box-1">4.1</div>
            <div class="box">4.2</div>
            <div class="box">4.3</div>
        </div>
    </div>
